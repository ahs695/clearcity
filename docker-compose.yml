version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: clearcity
      POSTGRES_USER: clearcity
      POSTGRES_PASSWORD: clearcity123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "psql -U clearcity -d clearcity -c 'SELECT 1 FROM stations LIMIT 1;' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://clearcity:clearcity123@db:5432/clearcity
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts

volumes:
  pgdata:
